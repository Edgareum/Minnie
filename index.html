  <style>
    .people-grid {
      max-width: 1100px;
      margin: 0 auto 5rem;
      padding: 0 1.5rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 1.4rem;
      position: relative;
      z-index: 1;
    }

    .person-tile {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 20px;
      padding: 1.4rem 1rem 1.2rem;
      text-align: center;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.7rem;
      position: relative;
      overflow: hidden;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.4s ease,
                  border-color 0.3s;
      backdrop-filter: blur(12px);
    }

    .person-tile::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(to right, #c9a84c, #e8a0b0, #c9a84c);
      border-radius: 20px 20px 0 0;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .person-tile:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,168,76,0.3);
      border-color: rgba(201,168,76,0.3);
    }

    .person-tile:hover::before { opacity: 1; }

    .tile-name {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, #f0d080 60%, #e8a0b0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.06em;
    }

    .tile-qr {
      border-radius: 10px;
      background: #fff;
      padding: 6px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      transition: transform 0.3s ease, box-shadow 0.3s;
    }

    .person-tile:hover .tile-qr {
      transform: scale(1.06);
      box-shadow: 0 8px 28px rgba(201,168,76,0.3);
    }

    @media (max-width: 560px) {
      .people-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 0.9rem;
        padding: 0 0.8rem;
      }
      .tile-name { font-size: 1.1rem; }
    }
  </style>
